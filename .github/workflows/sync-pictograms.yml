on:
  workflow_dispatch:

name: Sync Pictograms from Figma

concurrency:
  group: 'sync-pictograms'
  cancel-in-progress: false

jobs:
  sync-pictograms:
    name: Generate pictograms and create PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          check-latest: true
          cache: pnpm

      - name: Install all packages
        run: pnpm i

      - name: Generate pictogram source from Figma
        run: pnpm generate-pictograms
        working-directory: ./packages/frosted-ui-icons
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}

      - name: Build icon package
        run: pnpm build
        working-directory: ./packages/frosted-ui-icons

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: 'chore(pictograms): sync pictograms from Figma'
          title: 'chore(pictograms): sync pictograms from Figma'
          body: |
            ## Pictogram Sync from Figma

            This PR was automatically generated by the "Sync Pictograms from Figma" workflow.

            ### Review Checklist
            - [ ] Check the Storybook **Pictograms** page for visual issues across `auto` / `light` / `dark` / `orange` tiles
            - [ ] Review the diff for unexpected pictogram deletions/renames
            - [ ] Verify no corrupted SVGs were generated
            - [ ] If any new pictograms fell back to per-variant inlining (look for `[pictograms]` warnings in the workflow log), confirm the source artwork in Figma is intentional

            ### What happens on merge?
            When this PR is merged to main, `turbo-module` will detect the pictogram changes and include `@frosted-ui/icons` in the next auto-release PR. Merge that PR to publish.
          branch: sync-pictograms
          delete-branch: true
          labels: |
            pictograms
            automated

      - name: No changes detected
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "No changes detected in pictograms. Nothing to sync."
          echo "::notice::No pictogram changes detected from Figma. The pictograms are already in sync."
